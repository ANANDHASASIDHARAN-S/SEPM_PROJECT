version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: moonshot-postgres
    environment:
      POSTGRES_DB: moonshot
      POSTGRES_USER: moonshot
      POSTGRES_PASSWORD: moonshot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonshot -d moonshot"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: moonshot-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moonshot-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://moonshot:moonshot@postgres:5432/moonshot
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET_KEY: CHANGE_ME_IN_PRODUCTION
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: http://localhost:3000
      SIEM_INGEST_API_KEY: local-dev-siem-key
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moonshot-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  es_data:
